<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VibeNet | Mini Social Media</title>
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide@latest"></script>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- Toast Notifications Container -->
  <div id="toast-container" class="toast-container"></div>

  <!-- Loading Overlay -->
  <div id="loading-overlay" class="loading-overlay hidden">
    <div class="spinner"></div>
  </div>

  <!-- 1. Authentication View -->
  <div id="auth-view" class="auth-container">
    <div class="auth-card">
      <div class="auth-brand">
        <i data-lucide="sparkles" class="brand-icon"></i>
        <h1>VibeNet</h1>
        <p>Connect. Share. Inspire.</p>
      </div>

      <!-- Login Form -->
      <form id="login-form" class="auth-form">
        <h2>Welcome Back</h2>
        <div class="form-group">
          <label for="login-username"><i data-lucide="user"></i> Username or Email</label>
          <input type="text" id="login-username" placeholder="Enter username or email" required>
        </div>
        <div class="form-group">
          <label for="login-password"><i data-lucide="lock"></i> Password</label>
          <input type="password" id="login-password" placeholder="Enter your password" required>
        </div>
        <button type="submit" class="btn btn-primary btn-block">Sign In</button>
        <p class="auth-switch">Don't have an account? <span id="switch-to-register">Sign Up</span></p>
      </form>

      <!-- Register Form -->
      <form id="register-form" class="auth-form hidden">
        <h2>Create Account</h2>
        <div class="form-group">
          <label for="register-username"><i data-lucide="user"></i> Username</label>
          <input type="text" id="register-username" placeholder="Choose a username" required minlength="3">
        </div>
        <div class="form-group">
          <label for="register-email"><i data-lucide="mail"></i> Email Address</label>
          <input type="email" id="register-email" placeholder="Enter your email" required>
        </div>
        <div class="form-group">
          <label for="register-password"><i data-lucide="lock"></i> Password</label>
          <input type="password" id="register-password" placeholder="Choose a password (min 6 chars)" required minlength="6">
        </div>
        <button type="submit" class="btn btn-primary btn-block">Create Account</button>
        <p class="auth-switch">Already have an account? <span id="switch-to-login">Sign In</span></p>
      </form>
    </div>
  </div>

  <!-- 2. Main App View (Authenticated) -->
  <div id="app-view" class="app-layout hidden">
    <!-- Sidebar Navigation -->
    <aside class="sidebar">
      <div class="sidebar-brand">
        <i data-lucide="sparkles" class="brand-icon"></i>
        <span>VibeNet</span>
      </div>

      <div class="current-user-card" id="sidebar-user-card">
        <img src="" alt="Avatar" class="user-avatar" id="sidebar-avatar">
        <div class="user-details">
          <span class="user-name" id="sidebar-username">@username</span>
          <span class="user-tag" id="sidebar-usertag">Profile</span>
        </div>
      </div>

      <nav class="sidebar-nav">
        <button class="nav-item active" id="nav-feed">
          <i data-lucide="home"></i> Home Feed
        </button>
        <button class="nav-item" id="nav-profile">
          <i data-lucide="user"></i> My Profile
        </button>
        <button class="nav-item" id="nav-create-post-trigger">
          <i data-lucide="plus-circle"></i> Create Post
        </button>
      </nav>

      <button class="btn btn-logout" id="btn-logout">
        <i data-lucide="log-out"></i> Logout
      </button>
    </aside>

    <!-- Main Content Area -->
    <main class="main-content">
      <!-- Home Feed Panel -->
      <section id="feed-panel" class="content-panel">
        <div class="panel-header">
          <h2>Home Feed</h2>
        </div>

        <!-- Create Post Card -->
        <div class="create-post-card">
          <form id="create-post-form">
            <div class="post-input-wrapper">
              <img src="" alt="Avatar" class="user-avatar mini-avatar" id="post-creator-avatar">
              <textarea id="post-content" placeholder="What's vibing today?" required rows="3"></textarea>
            </div>
            
            <div id="post-image-preview-container" class="post-image-preview hidden">
              <img src="" alt="Preview" id="post-image-preview">
              <button type="button" id="remove-preview-btn" class="btn-remove-preview">
                <i data-lucide="x"></i>
              </button>
            </div>

            <div class="post-actions">
              <label for="post-image-input" class="btn-icon-label" title="Add Image">
                <i data-lucide="image"></i> Add Photo
                <input type="file" id="post-image-input" accept="image/*" class="hidden-input">
              </label>
              <button type="submit" class="btn btn-primary">Share Vibe</button>
            </div>
          </form>
        </div>

        <!-- Feed Posts Container -->
        <div class="posts-feed" id="posts-container">
          <!-- Dynamically populated -->
        </div>
      </section>

      <!-- Profile Panel -->
      <section id="profile-panel" class="content-panel hidden">
        <!-- Profile Header -->
        <div class="profile-header-card">
          <div class="profile-meta">
            <div class="profile-avatar-wrapper">
              <img src="" alt="Profile Avatar" class="profile-avatar" id="profile-avatar">
            </div>
            <div class="profile-text">
              <h2 id="profile-username">@username</h2>
              <p class="profile-joined"><i data-lucide="calendar"></i> Joined <span id="profile-joined-date">June 2026</span></p>
              <p class="profile-bio" id="profile-bio">No bio written yet.</p>
            </div>
            <div class="profile-actions-wrapper">
              <button class="btn btn-secondary" id="btn-edit-profile"><i data-lucide="edit-3"></i> Edit Profile</button>
              <button class="btn btn-primary hidden" id="btn-follow-user"><i data-lucide="user-plus"></i> Follow</button>
            </div>
          </div>
          
          <div class="profile-stats">
            <div class="stat-item">
              <span class="stat-value" id="stat-posts">0</span>
              <span class="stat-label">Posts</span>
            </div>
            <div class="stat-item clickable" id="stat-followers-btn">
              <span class="stat-value" id="stat-followers">0</span>
              <span class="stat-label">Followers</span>
            </div>
            <div class="stat-item clickable" id="stat-following-btn">
              <span class="stat-value" id="stat-following">0</span>
              <span class="stat-label">Following</span>
            </div>
          </div>
        </div>

        <div class="panel-subheader">
          <h3 id="profile-posts-title">Posts</h3>
        </div>

        <!-- Profile Posts Feed -->
        <div class="posts-feed" id="profile-posts-container">
          <!-- Dynamically populated -->
        </div>
      </section>
    </main>
  </div>

  <!-- 3. Modals -->
  <!-- Edit Profile Modal -->
  <div id="edit-profile-modal" class="modal-overlay hidden">
    <div class="modal-card">
      <div class="modal-header">
        <h3>Edit Profile</h3>
        <button class="btn-close-modal" id="btn-close-edit-modal">
          <i data-lucide="x"></i>
        </button>
      </div>
      <form id="edit-profile-form">
        <div class="modal-body">
          <div class="avatar-edit-section">
            <div class="edit-avatar-preview-wrapper">
              <img src="" alt="Avatar" id="edit-avatar-preview">
            </div>
            <label for="edit-avatar-input" class="btn btn-secondary">
              <i data-lucide="camera"></i> Change Photo
              <input type="file" id="edit-avatar-input" accept="image/*" class="hidden-input">
            </label>
          </div>
          <div class="form-group">
            <label for="edit-bio">Bio</label>
            <textarea id="edit-bio" rows="4" placeholder="Tell the world about yourself..." maxlength="160"></textarea>
          </div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" id="btn-cancel-edit-profile">Cancel</button>
          <button type="submit" class="btn btn-primary">Save Changes</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Followers / Following Modal -->
  <div id="users-modal" class="modal-overlay hidden">
    <div class="modal-card">
      <div class="modal-header">
        <h3 id="users-modal-title">Followers</h3>
        <button class="btn-close-modal" id="btn-close-users-modal">
          <i data-lucide="x"></i>
        </button>
      </div>
      <div class="modal-body user-list" id="users-modal-list">
        <!-- Dynamically populated list of users -->
      </div>
    </div>
  </div>

  <!-- SPA Core Scripts -->
  <script src="js/api.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
